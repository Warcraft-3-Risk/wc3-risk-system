changelog:
  categories:
    - title: "🚀 Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "🏗️ Maintenance"
      labels:
        - "chore"
        - "maintenance"
        - "dependencies"
    - title: "📖 Documentation"
      labels:
        - "documentation"
    - title: "🗺️ Map Changes"
      labels:
        - "map"
        - "terrain"
  exclude:
    labels:
      - "skip-changelog"
