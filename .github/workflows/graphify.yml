name: Graphify

on:
  push:
    branches:
      - '**'

jobs:
  graphify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Graphify
        run: pip install graphifyy

      - name: Run Graphify
        env:
          # Note: Set your preferred AI model API key in GitHub Secrets to enable semantic extraction.
          # Examples:
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GRAPHIFY_NO_API_KEY_ERROR: 'true' # Prevent failure if no API key is provided, so AST extraction still runs
        run: |
          graphify extract . --no-cluster

      # Optional: Automatically commit the generated graph files back to the repository
      - name: Commit graphify outputs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add graphify-out/
          git commit -m "chore: update graphify outputs [skip ci]" || echo "No changes to commit"
          git push
