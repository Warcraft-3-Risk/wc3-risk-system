name: Build and Release

on:
  release:
    types: [published] # Triggers when a new release is published

env:
  OUTPUT_FOLDER: "./artifact"

jobs:
  build:
    permissions: write-all
    runs-on: windows-latest

    strategy:
      matrix:
        terrain: [asia, europe, world]
        w3c_mode: [true, false]

    env:
      W3C_MODE_ENABLED: ${{ matrix.w3c_mode }}

    steps:
      - name: Validate tag format
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF -replace 'refs/tags/', ''
          if ($TAG -notmatch '^\d+\.\d+(-[\w]+)?$') {
            Write-Error "Tag '$TAG' does not match expected format X.YZ or X.YZ-suffix (e.g. 1.23, 4.09-unstable)"
            exit 1
          }
          Write-Output "Tag format valid: $TAG"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate version suffix
        shell: pwsh
        run: |
          $TAG_NAME = $env:GITHUB_REF -replace 'refs/tags/', ''
          $TERRAIN = "${{ matrix.terrain }}"
          $TERRAIN_CAPITALIZED = $TERRAIN.Substring(0,1).ToUpper() + $TERRAIN.Substring(1)

          if ($env:W3C_MODE_ENABLED -eq "true") {
            $TAG_NAME = "${TAG_NAME}_1v1"
            $SUFFIX = "_w3c"
          } else {
            $SUFFIX = ""
          }

          echo "TAG_NAME=$TAG_NAME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "W3C_SUFFIX=$SUFFIX" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "RELEASE_FILENAME=Risk_${TERRAIN_CAPITALIZED}_${TAG_NAME}${SUFFIX}.w3x" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: npm install

      - name: Build the application
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
          W3C_MODE_ENABLED: ${{ env.W3C_MODE_ENABLED }}
        run: npm run build ${{ matrix.terrain }}

      - name: Upload packaged app using GitHub CLI
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ env.OUTPUT_FOLDER }}/${{ env.RELEASE_FILENAME }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ env.TAG_NAME }}
